<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Jinja SSS</title>
    
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/utilities/spacing.css">
    <link rel="stylesheet" href="../css/utilities/typography.css">
    <link rel="stylesheet" href="../css/utilities/colors.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <link rel="stylesheet" href="../css/components/cards.css">
    
    <script src="../js/utils.js" defer></script>
    <script src="../js/api.js" defer></script>
    <script src="../js/auth.js" defer></script>
    <script src="../js/validation.js" defer></script>
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-secondary);
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: var(--spacing-2xl);
        }
        .auth-logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: var(--spacing-md);
        }
        .auth-title {
            text-align: center;
            margin-bottom: var(--spacing-sm);
        }
        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xl);
        }
        .auth-link {
            text-align: center;
            margin-top: var(--spacing-lg);
            font-size: var(--font-size-sm);
        }
    </style>
</head>
<body>
    <div class="jss-card auth-card">
        <div class="auth-logo">🏫</div>
        <h2 class="auth-title">Sign In</h2>
        <p class="auth-subtitle">Enter your ID, email, or username</p>
        
        <form onsubmit="handleSignIn(event)">
            <div class="jss-form-group">
                <label class="jss-label" for="identifier">ID / Email / Username</label>
                <input type="text" id="identifier" class="jss-input" placeholder="e.g., JSSS-001 or TCH-001" required>
            </div>
            
            <div class="jss-form-group">
                <label class="jss-label" for="password">Password</label>
                <input type="password" id="password" class="jss-input" placeholder="Enter your password" required>
            </div>
            
            <div class="jss-form-group">
                <label class="jss-checkbox">
                    <input type="checkbox">
                    Remember me
                </label>
            </div>
            
            <button type="submit" class="jss-btn jss-btn--primary jss-btn--lg jss-btn--full jss-mb-md">Sign In</button>
        </form>
        
        <div class="auth-link">
            <a href="reset-password.html">Forgot Password?</a>
        </div>
        
        <div class="auth-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
        
        <div class="auth-link" style="margin-top: var(--spacing-md);">
            <a href="../index.html">← Back to Home</a>
        </div>
    </div>
    
    <script>
    async function handleSignIn(e) {
        e.preventDefault();
        const identifier = document.getElementById('identifier').value;
        const password = document.getElementById('password').value;
        
        const btn = e.target.querySelector('button');
        btn.classList.add('jss-btn--loading');
        btn.disabled = true;
        
        try {
            const response = await signIn(identifier, password);
            if (response.token) {
                window.location.href = 'dashboard.html';
            }
        } catch (error) {
            alert('Login failed: ' + error.message);
        } finally {
            btn.classList.remove('jss-btn--loading');
            btn.disabled = false;
        }
    }
    </script>
</body>
</html>
