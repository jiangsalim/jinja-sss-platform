<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Jinja SSS</title>
    
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/utilities/spacing.css">
    <link rel="stylesheet" href="../css/utilities/typography.css">
    <link rel="stylesheet" href="../css/utilities/colors.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <link rel="stylesheet" href="../css/components/cards.css">
    
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-secondary); }
        .auth-card { width: 100%; max-width: 440px; padding: var(--spacing-2xl); }
        .auth-logo { text-align: center; font-size: 48px; margin-bottom: var(--spacing-md); }
        .auth-title { text-align: center; margin-bottom: var(--spacing-sm); }
        .auth-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: var(--spacing-xl); }
        .auth-link { text-align: center; margin-top: var(--spacing-lg); font-size: var(--font-size-sm); }
    </style>
</head>
<body>
    <div class="jss-card auth-card">
        <div class="auth-logo">🏫</div>
        <h2 class="auth-title">Forgot Password?</h2>
        <p class="auth-subtitle">Enter your ID, email, or username to reset your password.</p>
        
        <form onsubmit="handleResetRequest(event)">
            <div class="jss-form-group">
                <label class="jss-label" for="identifier">ID / Email / Username</label>
                <input type="text" id="identifier" class="jss-input" placeholder="Enter your ID, email, or username" required>
            </div>
            
            <button type="submit" class="jss-btn jss-btn--primary jss-btn--lg jss-btn--full jss-mb-md">Send Reset Link</button>
        </form>
        
        <div class="auth-link">
            Remember your password? <a href="signin.html">Back to Sign In</a>
        </div>
        <div class="auth-link">
            <a href="../index.html">← Back to Home</a>
        </div>
    </div>
    
    <script>
    function handleResetRequest(e) {
        e.preventDefault();
        alert('Password reset link will be sent to your registered email. (Backend coming soon)');
    }
    </script>
</body>
</html>
