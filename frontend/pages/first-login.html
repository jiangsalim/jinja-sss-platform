<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Jinja SSS</title>
    
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/utilities/spacing.css">
    <link rel="stylesheet" href="../css/utilities/typography.css">
    <link rel="stylesheet" href="../css/utilities/colors.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <link rel="stylesheet" href="../css/components/cards.css">
    <link rel="stylesheet" href="../css/components/alert.css">
    
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-secondary); }
        .auth-card { width: 100%; max-width: 460px; padding: var(--spacing-2xl); }
        .auth-logo { text-align: center; font-size: 48px; margin-bottom: var(--spacing-md); }
        .auth-title { text-align: center; margin-bottom: var(--spacing-md); }
    </style>
</head>
<body>
    <div class="jss-card auth-card">
        <div class="auth-logo">🏫</div>
        <h2 class="auth-title">Change Your Password</h2>
        
        <div class="jss-alert jss-alert--warning jss-mb-lg">
            ⚠️ This is your first login. Please change your temporary password.
        </div>
        
        <form onsubmit="handlePasswordChange(event)">
            <div class="jss-form-group">
                <label class="jss-label">Current Password (Your ID number)</label>
                <input type="password" id="currentPassword" class="jss-input" required>
            </div>
            <div class="jss-form-group">
                <label class="jss-label">New Password</label>
                <input type="password" id="newPassword" class="jss-input" required minlength="6">
                <span class="jss-help-text">At least 6 characters</span>
            </div>
            <div class="jss-form-group">
                <label class="jss-label">Confirm New Password</label>
                <input type="password" id="confirmPassword" class="jss-input" required>
            </div>
            
            <button type="submit" class="jss-btn jss-btn--primary jss-btn--lg jss-btn--full">Update Password</button>
        </form>
    </div>
    
    <script>
    function handlePasswordChange(e) {
        e.preventDefault();
        const newPass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        
        if (newPass !== confirm) {
            alert('Passwords do not match!');
            return;
        }
        if (newPass.length < 6) {
            alert('Password must be at least 6 characters!');
            return;
        }
        alert('Password changed successfully! Redirecting to dashboard...');
    }
    </script>
</body>
</html>
