<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Jinja SSS</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/utilities/spacing.css">
    <link rel="stylesheet" href="../css/utilities/typography.css">
    <link rel="stylesheet" href="../css/utilities/colors.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <link rel="stylesheet" href="../css/components/cards.css">
    <script src="../js/utils.js" defer></script>
    <script src="../js/api.js" defer></script>
    <script src="../js/validation.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; font-family: var(--font-family);
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-dark));
            overflow-x: hidden;
        }
        .bg-pattern { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 30px 30px; pointer-events: none; }
        .auth-container { width: 100%; max-width: 480px; padding: var(--spacing-md); position: relative; z-index: 1; }
        .auth-card { background: var(--bg-primary); border-radius: var(--radius-xl); padding: var(--spacing-2xl) var(--spacing-xl); box-shadow: var(--shadow-2xl); animation: slideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .auth-logo { text-align: center; font-size: 56px; margin-bottom: var(--spacing-sm); animation: bounce 0.6s ease; }
        .auth-title { text-align: center; font-size: var(--font-size-3xl); font-weight: var(--font-weight-bold); color: var(--text-primary); margin-bottom: var(--spacing-xs); }
        .auth-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: var(--spacing-xl); font-size: var(--font-size-md); }
        .float-group { position: relative; margin-bottom: var(--spacing-lg); }
        .float-group input, .float-group select {
            width: 100%; padding: 14px 16px; border: 1.5px solid var(--border);
            border-radius: var(--radius-md); font-size: var(--font-size-lg);
            background: var(--bg-primary); color: var(--text-primary);
            transition: all 0.3s ease; outline: none;
        }
        .float-group label {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            font-size: var(--font-size-md); color: var(--text-secondary);
            pointer-events: none; transition: all 0.3s ease;
            background: var(--bg-primary); padding: 0 4px;
        }
        .float-group input:focus, .float-group input:not(:placeholder-shown), .float-group select:focus, .float-group select:not([value=""]) { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(30,60,114,0.1); }
        .float-group input:focus + label, .float-group input:not(:placeholder-shown) + label, .float-group select:focus + label, .float-group select:not([value=""]) + label { top: 0; font-size: var(--font-size-xs); color: var(--primary-blue); font-weight: var(--font-weight-medium); }
        .float-group input::placeholder, .float-group select::placeholder { color: transparent; }
        .step-title { font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); margin-bottom: var(--spacing-md); color: var(--primary-blue); }
        .hidden { display: none; }
        .auth-link { text-align: center; margin-top: var(--spacing-lg); font-size: var(--font-size-sm); color: var(--text-secondary); }
        .auth-link a { color: var(--primary-blue); text-decoration: none; font-weight: var(--font-weight-medium); }
        .auth-link a:hover { text-decoration: underline; }
        .shake { animation: shake 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-6px); } 80% { transform: translateX(6px); } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="auth-container">
        <div class="auth-card" id="authCard">
            <div class="auth-logo">🏫</div>
            <h2 class="auth-title">Create Your Account</h2>
            <p class="auth-subtitle">For Parents & Alumni only</p>
            <form onsubmit="handleSignUp(event)" id="signupForm">
                <div id="step1">
                    <p class="step-title">Step 1: Select Account Type</p>
                    <div class="jss-radio-group jss-mb-lg">
                        <label class="jss-radio"><input type="radio" name="accountType" value="parent" onchange="showNextStep('parent')"> Parent</label>
                        <label class="jss-radio"><input type="radio" name="accountType" value="alumni" onchange="showNextStep('alumni')"> Alumni (OB/OG)</label>
                    </div>
                </div>
                <div id="step2" class="hidden">
                    <p class="step-title">Step 2: Personal Information</p>
                    <div class="float-group"><input type="text" id="fullName" placeholder=" " required><label>Full Name</label></div>
                    <div class="float-group"><input type="email" id="email" placeholder=" "><label>Email</label></div>
                    <div class="float-group"><input type="tel" id="phone" placeholder=" "><label>Phone</label></div>
                </div>
                <div id="step3-parent" class="hidden">
                    <p class="step-title">Step 3: Child Verification</p>
                    <div id="childFields">
                        <div class="float-group"><input type="text" class="child-name" placeholder=" " required><label>Child Full Name</label></div>
                        <div class="float-group"><input type="text" class="child-admission" placeholder="JSSS-XXX" required><label>Admission Number</label></div>
                    </div>
                </div>
                <div id="step4" class="hidden">
                    <p class="step-title">Step 4: Security</p>
                    <div class="float-group"><input type="text" id="username" placeholder=" " required><label>Username</label></div>
                    <div class="float-group"><input type="password" id="newPassword" placeholder=" " required minlength="6"><label>Password</label></div>
                    <div class="float-group"><input type="password" id="confirmPassword" placeholder=" " required><label>Confirm Password</label></div>
                    <div class="jss-form-group"><label class="jss-checkbox"><input type="checkbox" required> I agree to the Terms and Conditions</label></div>
                    <button type="submit" class="jss-btn jss-btn--primary jss-btn--lg jss-btn--full" id="signupBtn"><span id="btnText">Create Account</span></button>
                </div>
            </form>
            <div class="auth-link">Already have an account? <a href="signin.html">Sign In</a></div>
            <div class="auth-link" style="margin-top:var(--spacing-md);"><a href="../index.html">← Back to Home</a></div>
        </div>
    </div>
    <script>
    let accountType = '';
    function showNextStep(type) {
        accountType = type;
        document.getElementById('step2').classList.remove('hidden');
        if (type === 'parent') { document.getElementById('step3-parent').classList.remove('hidden'); }
        else { document.getElementById('step3-parent').classList.add('hidden'); }
        document.getElementById('step4').classList.remove('hidden');
    }
    async function handleSignUp(e) {
        e.preventDefault();
        const password = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        const card = document.getElementById('authCard');
        if (password !== confirm) {
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 500);
            return;
        }
        const btn = document.getElementById('signupBtn');
        const btnText = document.getElementById('btnText');
        btn.classList.add('jss-btn--loading');
        btn.disabled = true;
        btnText.textContent = 'Creating Account...';
        setTimeout(() => { alert('Account created! (Backend coming soon)'); btn.classList.remove('jss-btn--loading'); btn.disabled = false; btnText.textContent = 'Create Account'; }, 1500);
    }
    </script>
</body>
</html>
