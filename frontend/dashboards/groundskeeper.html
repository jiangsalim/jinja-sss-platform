<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Groundskeeper - Jinja SSS</title><link rel="stylesheet" href="../css/variables.css"><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/dark-mode.css"><link rel="stylesheet" href="../css/responsive.css"><link rel="stylesheet" href="../css/utilities/spacing.css"><link rel="stylesheet" href="../css/utilities/typography.css"><link rel="stylesheet" href="../css/utilities/colors.css"><link rel="stylesheet" href="../css/components/buttons.css"><link rel="stylesheet" href="../css/components/cards.css"><link rel="stylesheet" href="../css/components/badge.css"><link rel="stylesheet" href="../css/components/stats-card.css"><script src="../js/utils.js" defer></script><style>
body{background:var(--bg-secondary);}.dashboard{display:flex;min-height:100vh;}.sidebar{width:260px;background:linear-gradient(180deg,var(--primary-blue),#0f2442);color:white;position:fixed;top:0;left:0;bottom:0;z-index:100;}.sidebar__brand{padding:var(--spacing-lg);text-align:center;border-bottom:1px solid rgba(255,255,255,0.1);font-weight:var(--font-weight-bold);font-size:var(--font-size-lg);}.sidebar__item{display:flex;align-items:center;gap:var(--spacing-md);padding:var(--spacing-md)var(--spacing-lg);color:rgba(255,255,255,0.7);text-decoration:none;}.sidebar__item:hover,.sidebar__item--active{background:rgba(255,255,255,0.1);color:white;}.main{margin-left:260px;flex:1;padding:var(--spacing-lg);}.topbar{background:var(--bg-primary);padding:var(--spacing-md)var(--spacing-lg);border-radius:var(--radius-lg);display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--spacing-lg);box-shadow:var(--shadow-sm);}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:var(--spacing-md);margin-bottom:var(--spacing-lg);}@media(max-width:767px){.sidebar{display:none;}.main{margin-left:0;}}
</style></head><body>
<div class="dashboard">
    <aside class="sidebar"><div class="sidebar__brand">🌿 Grounds</div><nav style="flex:1;padding:var(--spacing-md)0;"><a href="#" class="sidebar__item sidebar__item--active">📊 Dashboard</a><a href="#" class="sidebar__item">📋 Tasks</a><a href="#" class="sidebar__item">🔧 Equipment</a><a href="#" class="sidebar__item">📦 Supplies</a></nav><div style="padding:var(--spacing-md);border-top:1px solid rgba(255,255,255,0.1);"><a href="../pages/signin.html" class="sidebar__item">🚪 Logout</a></div></aside>
    <main class="main">
        <div class="topbar"><div><strong style="font-size:var(--font-size-xl);">Groundskeeper</strong><br><span class="jss-text-small">Mr. Simon • GRD-001</span></div><div style="display:flex;gap:var(--spacing-md);"><span>🔔</span><span>👤</span></div></div>
        <div class="stats-grid"><div class="jss-stat-card"><div class="jss-stat-card__value">6</div><div class="jss-stat-card__label">Tasks Today</div></div><div class="jss-stat-card jss-stat-card--success"><div class="jss-stat-card__value">3</div><div class="jss-stat-card__label">Completed</div></div><div class="jss-stat-card jss-stat-card--success"><div class="jss-stat-card__value">Ready</div><div class="jss-stat-card__label">Sports Field</div></div><div class="jss-stat-card"><div class="jss-stat-card__value">Sunny</div><div class="jss-stat-card__label">Weather</div></div></div>
        <div class="jss-card jss-mb-lg"><div class="jss-card__header"><h3 class="jss-card__header-title">📋 Today's Tasks</h3></div><div class="jss-card__body"><table class="jss-table"><thead><tr><th>Task</th><th>Area</th><th>Priority</th><th>Status</th></tr></thead><tbody><tr><td>Mow lawn</td><td>Main Field</td><td>High</td><td><span class="jss-badge jss-badge--warning">In Prog</span></td></tr><tr><td>Water plants</td><td>Garden</td><td>Medium</td><td><span class="jss-badge jss-badge--warning">Pending</span></td></tr><tr><td>Trim hedges</td><td>Admin Block</td><td>Low</td><td><span class="jss-badge jss-badge--warning">Pending</span></td></tr></tbody></table></div></div>
    </main>
</div>
</body></html>
