<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Admin - Jinja SSS</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/utilities/spacing.css">
    <link rel="stylesheet" href="../css/utilities/typography.css">
    <link rel="stylesheet" href="../css/utilities/colors.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/cards.css">
    <link rel="stylesheet" href="../css/components/tables.css">
    <link rel="stylesheet" href="../css/components/badge.css">
    <link rel="stylesheet" href="../css/components/stats-card.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-secondary); font-family: var(--font-family); }
        .topbar { background: linear-gradient(135deg, var(--primary-blue), var(--primary-dark)); color: #fff; padding: 15px; text-align: center; }
        .topbar h2 { font-size: 18px; margin: 0; }
        .topbar span { font-size: 12px; opacity: 0.8; }
        .container { padding: 12px; max-width: 100%; margin: 0 auto; }
        .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--bg-primary); padding: 15px; border-radius: 12px; text-align: center; box-shadow: var(--shadow-sm); }
        .stat-card .value { font-size: 24px; font-weight: bold; color: var(--primary-blue); }
        .stat-card .label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-grid button { padding: 12px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: var(--primary-blue); color: #fff; width: 100%; }
        .btn-grid button.secondary { background: var(--bg-primary); color: var(--primary-blue); border: 1.5px solid var(--primary-blue); }
        .section { background: var(--bg-primary); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: var(--shadow-sm); }
        .section h3 { font-size: 16px; margin-bottom: 10px; }
        .section input, .section select { width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 8px; }
        .logout-btn { background: #dc3545; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 600; width: 100%; font-size: 14px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="topbar">
        <h2>👑 Welcome, Programmer Herman!</h2>
        <span>System Administrator</span>
    </div>

    <div class="container">
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card"><div class="value" id="totalUsers">--</div><div class="label">Total Users</div></div>
            <div class="stat-card"><div class="value" id="totalStudents">--</div><div class="label">Students</div></div>
            <div class="stat-card"><div class="value" id="totalTeachers">--</div><div class="label">Teachers</div></div>
            <div class="stat-card"><div class="value" id="totalParents">--</div><div class="label">Parents</div></div>
        </div>

        <!-- Quick Actions -->
        <div class="btn-grid">
            <button onclick="alert('Add User feature coming soon!')">➕ Add User</button>
            <button class="secondary" onclick="alert('View Audit Log coming soon!')">📋 Audit Log</button>
            <button class="secondary" onclick="alert('Settings coming soon!')">⚙️ Settings</button>
            <button class="secondary" onclick="alert('Backup feature coming soon!')">💾 Backup</button>
        </div>

        <!-- System Info -->
        <div class="section">
            <h3>📊 System Information</h3>
            <p style="font-size:13px;color:var(--text-secondary)">✅ Server: Running</p>
            <p style="font-size:13px;color:var(--text-secondary)">✅ Database: Connected (73 tables)</p>
            <p style="font-size:13px;color:var(--text-secondary)">✅ API: 200+ endpoints active</p>
        </div>

        <!-- Quick Links -->
        <div class="section">
            <h3>🔗 Quick Links</h3>
            <p style="font-size:13px"><a href="https://jinja-sss-api.onrender.com/api/docs" style="color:var(--primary-blue)">📖 API Documentation</a></p>
            <p style="font-size:13px"><a href="https://jinja-sss-api.onrender.com/health" style="color:var(--primary-blue)">💚 Health Check</a></p>
            <p style="font-size:13px"><a href="https://jinja-sss-platform.vercel.app" style="color:var(--primary-blue)">🌍 Main Website</a></p>
        </div>

        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('https://jinja-sss-api.onrender.com/api/super-admin/dashboard', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('authToken')}` }
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('totalUsers').textContent = data.data.total_users || '0';
                    document.getElementById('totalStudents').textContent = data.data.total_students || '0';
                    document.getElementById('totalTeachers').textContent = data.data.total_teachers || '0';
                    document.getElementById('totalParents').textContent = data.data.total_parents || '0';
                }
            } catch (e) { console.log('Loading...'); }
        }
        function logout() { localStorage.removeItem('authToken'); window.location.href = '../pages/signin.html'; }
        loadDashboard();
    </script>
</body>
</html>
